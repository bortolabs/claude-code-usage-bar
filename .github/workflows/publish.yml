name: Publish extension

# Empacota o .vsix uma vez e:
#   - cria um GitHub Release com o .vsix ANEXADO (canal de download sempre disponível);
#   - publica no Open VSX (ovsx)            -> requer secret OVSX_PAT;
#   - tenta publicar no Visual Studio Marketplace (vsce) -> requer secret VSCE_PAT.
#
# O passo do VS Marketplace é "continue-on-error": enquanto a conta de publisher
# estiver bloqueada pela Microsoft, ele falha sem derrubar o release nem o Open VSX;
# quando a conta for reativada, volta a publicar sozinho.
#
# Dois gatilhos:
#   - push de tag "v*.*.*"  -> valida que a tag == version do package.json
#   - workflow_dispatch     -> publica a version atual do package.json
#
# A versão vem SEMPRE do package.json; faça o bump (+ CHANGELOG) antes.
#
# Secrets (Settings > Secrets and variables > Actions):
#   - OVSX_PAT : token do open-vsx.org (https://open-vsx.org, login com GitHub).
#                Requer namespace "bortolabs" criado e o Eclipse Publisher Agreement assinado.
#   - VSCE_PAT : PAT do Azure DevOps com escopo "Marketplace > Manage" (publisher "bortolabs").
# (O GitHub Release usa o GITHUB_TOKEN automático.)

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

# Serializa os publishes: nunca dois runs ao mesmo tempo (publishes concorrentes
# contra o VS Marketplace estouram o limite "VSID Concurrency" e bloqueiam a conta).
# cancel-in-progress: false -> não mata um publish no meio; o próximo enfileira.
concurrency:
  group: marketplace-publish
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    # contents: write é necessário para criar a tag/Release.
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Gate de qualidade antes de empacotar: typecheck + testes.
      - name: Typecheck + testes
        run: npm run typecheck && npm test

      # Fonte da verdade da versão: o package.json.
      - name: Resolve versão
        id: ver
        run: |
          V="$(node -p "require('./package.json').version")"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V" >> "$GITHUB_OUTPUT"
          echo "vsix=claude-code-usage-bar-$V.vsix" >> "$GITHUB_OUTPUT"
          echo "Versão a publicar: v$V"

      # Em push de TAG, garante que a tag corresponde à version do package.json.
      - name: Verifica tag x version (push de tag)
        if: github.event_name == 'push'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$TAG" != "${{ steps.ver.outputs.version }}" ]; then
            echo "::error::A tag ($TAG) não corresponde à version do package.json (${{ steps.ver.outputs.version }}). Faça o bump antes de tagear."
            exit 1
          fi

      # Empacota UMA vez (roda vscode:prepublish = npm run compile) e publica o
      # mesmo artefato nos dois registros + anexa no Release.
      - name: Empacota o .vsix
        run: npx --yes @vscode/vsce package -o "${{ steps.ver.outputs.vsix }}"

      # Extrai do CHANGELOG.md só o bloco da versão atual, p/ corpo do Release.
      - name: Extrai notas do CHANGELOG
        run: |
          awk -v ver="## ${{ steps.ver.outputs.version }}" '
            $0 == ver { flag = 1; next }
            /^## / && flag { flag = 0 }
            flag { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release ${{ steps.ver.outputs.version }}" > release-notes.md
          fi

      # Cria a tag (se preciso) e o Release com o .vsix anexado — SEMPRE, mesmo que
      # um registro falhe; assim há sempre um download de fallback.
      - name: Cria o GitHub Release (com o .vsix)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          target_commitish: ${{ github.sha }}
          body_path: release-notes.md
          files: ${{ steps.ver.outputs.vsix }}

      # Open VSX (registro independente da Microsoft) — caminho de publicação vivo.
      - name: Garante namespace no Open VSX
        continue-on-error: true
        run: npx --yes ovsx create-namespace bortolabs -p "$OVSX_PAT"
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Publish to Open VSX
        run: |
          n=0; max=5
          until npx --yes ovsx publish "${{ steps.ver.outputs.vsix }}" -p "$OVSX_PAT"; do
            n=$((n + 1))
            if [ "$n" -ge "$max" ]; then
              echo "::error::ovsx publish falhou após $max tentativas."
              exit 1
            fi
            wait=$((30 * n))
            echo "::warning::Open VSX falhou (tentativa $n/$max). Aguardando ${wait}s…"
            sleep "$wait"
          done
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      # VS Marketplace — DESATIVADO enquanto a conta do publisher estiver
      # bloqueada pela Microsoft: nem UMA tentativa (cada publish contra conta
      # bloqueada soma carga no "VSID Concurrency" e piora o bloqueio).
      # Para reativar quando a conta voltar: Settings > Secrets and variables >
      # Actions > Variables → crie a variable PUBLISH_VSCE = true (sem mudança
      # de código). Enquanto isso, o canal vivo é Open VSX + .vsix do Release.
      - name: Publish to Visual Studio Marketplace
        if: vars.PUBLISH_VSCE == 'true'
        continue-on-error: true
        run: npx --yes @vscode/vsce publish --packagePath "${{ steps.ver.outputs.vsix }}" -p "$VSCE_PAT"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
