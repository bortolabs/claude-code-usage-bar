name: Publish extension

# Ao enviar uma tag de versão (ex.: v0.20.1), este workflow:
#   1. compila e publica a extensão no Visual Studio Marketplace (vsce); e
#   2. cria um GitHub Release com as notas da versão extraídas do CHANGELOG.md.
#
# Fluxo de release:
#   1. bump da "version" no package.json (+ CHANGELOG) e merge na master
#   2. git tag v0.20.1 && git push origin v0.20.1
#   3. este workflow publica e cria o release sozinho
#
# Pré-requisito: cadastrar o secret VSCE_PAT no repositório
# (Settings > Secrets and variables > Actions). É um Personal Access Token do
# Azure DevOps (https://dev.azure.com) com escopo "Marketplace > Manage",
# para o publisher "bortolabs". (O GitHub Release usa o GITHUB_TOKEN automático.)

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    # contents: write é necessário para criar o GitHub Release (sobrepõe o
    # default read acima só para este job).
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Trava de segurança: evita publicar uma versão diferente da que a tag diz.
      - name: Verifica tag x version do package.json
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG  package.json=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::A tag ($TAG) não corresponde à version do package.json ($PKG). Faça o bump antes de tagear."
            exit 1
          fi

      # vsce roda o script vscode:prepublish (npm run compile) automaticamente
      # antes de empacotar, então não precisa de um passo de build separado.
      - name: Publish to Visual Studio Marketplace
        run: npx --yes @vscode/vsce publish -p "$VSCE_PAT"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      # Extrai do CHANGELOG.md só o bloco da versão atual (entre "## <versão>" e
      # o próximo "## "), para usar como corpo do GitHub Release.
      - name: Extrai notas do CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="## $VERSION" '
            $0 == ver { flag = 1; next }
            /^## / && flag { flag = 0 }
            flag { print }
          ' CHANGELOG.md > release-notes.md
          # Fallback: se a seção não existir/estiver vazia, não falha o release.
          if [ ! -s release-notes.md ]; then
            echo "Release $VERSION" > release-notes.md
          fi
          echo "----- notas do release -----"
          cat release-notes.md

      - name: Cria o GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release-notes.md
