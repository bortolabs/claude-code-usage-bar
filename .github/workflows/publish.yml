name: Publish extension

# Publica a extensão no Visual Studio Marketplace (vsce) e cria um GitHub Release
# com as notas da versão extraídas do CHANGELOG.md.
#
# Dois gatilhos:
#   - push de tag "v*.*.*"  -> release por tag (valida que a tag == version)
#   - workflow_dispatch     -> publica a version atual do package.json e cria a
#                              tag/release correspondente (Actions > Run workflow)
#
# A versão publicada vem SEMPRE do package.json; faça o bump (+ CHANGELOG) antes.
#
# Pré-requisito: secret VSCE_PAT no repositório (Settings > Secrets and variables >
# Actions). É um Personal Access Token do Azure DevOps (https://dev.azure.com) com
# escopo "Marketplace > Manage", para o publisher "bortolabs". (O Release usa o
# GITHUB_TOKEN automático.)

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    # contents: write é necessário para criar a tag/Release.
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Fonte da verdade da versão: o package.json.
      - name: Resolve versão
        id: ver
        run: |
          V="$(node -p "require('./package.json').version")"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V" >> "$GITHUB_OUTPUT"
          echo "Versão a publicar: v$V"

      # Em push de TAG, garante que a tag corresponde à version do package.json.
      - name: Verifica tag x version (push de tag)
        if: github.event_name == 'push'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$TAG" != "${{ steps.ver.outputs.version }}" ]; then
            echo "::error::A tag ($TAG) não corresponde à version do package.json (${{ steps.ver.outputs.version }}). Faça o bump antes de tagear."
            exit 1
          fi

      # vsce roda o script vscode:prepublish (npm run compile) automaticamente
      # antes de empacotar, então não precisa de um passo de build separado.
      # Retry com backoff: o Marketplace/Azure às vezes barra o envio com um
      # bloqueio temporário de concorrência/rate-limit (RequestBlockedException /
      # 429). Re-tenta algumas vezes com espera crescente para absorver esses
      # blips curtos. (Um bloqueio de conta prolongado é com o suporte da Azure.)
      - name: Publish to Visual Studio Marketplace
        run: |
          n=0
          max=5
          until npx --yes @vscode/vsce publish -p "$VSCE_PAT"; do
            n=$((n + 1))
            if [ "$n" -ge "$max" ]; then
              echo "::error::vsce publish falhou após $max tentativas (rate-limit/concorrência da Azure?)."
              exit 1
            fi
            wait=$((30 * n))
            echo "::warning::Publish falhou (tentativa $n/$max). Aguardando ${wait}s e tentando de novo…"
            sleep "$wait"
          done
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      # Extrai do CHANGELOG.md só o bloco da versão atual (entre "## <versão>" e
      # o próximo "## "), para usar como corpo do GitHub Release.
      - name: Extrai notas do CHANGELOG
        run: |
          awk -v ver="## ${{ steps.ver.outputs.version }}" '
            $0 == ver { flag = 1; next }
            /^## / && flag { flag = 0 }
            flag { print }
          ' CHANGELOG.md > release-notes.md
          # Fallback: se a seção não existir/estiver vazia, não falha o release.
          if [ ! -s release-notes.md ]; then
            echo "Release ${{ steps.ver.outputs.version }}" > release-notes.md
          fi
          echo "----- notas do release -----"
          cat release-notes.md

      # Cria a tag (se ainda não existir, no caso do dispatch) e o Release.
      - name: Cria o GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          target_commitish: ${{ github.sha }}
          body_path: release-notes.md
